name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    # 01:17 UTC = 09:17 Asia/Shanghai
    - cron: "17 1 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mihomo-party-org/override-hub.git
          git fetch upstream main

      - name: Merge upstream/main into main
        id: merge
        run: |
          git merge --no-ff --no-edit upstream/main
          if git diff --quiet origin/main...HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync pull request
        if: steps.merge.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/sync-upstream-main
          base: main
          delete-branch: false
          title: "chore: sync upstream/main"
          body: |
            Automated sync PR from `upstream/main` into this fork's `main`.

            Notes:
            - This PR was generated by `.github/workflows/sync-upstream.yml`.
            - Merge this after CI and conflict review.
          commit-message: "chore: sync upstream/main"
